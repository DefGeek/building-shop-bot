<!-- app/static/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СтройМаркет AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>🏗️ СтройМаркет AI</h1>
    <div id="status">Загрузка...</div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Отправляем initData на бэкенд для авторизации
        async function authenticate() {
            try {
                const response = await fetch('/api/v1/auth/telegram', {
                    method: 'POST',
                    headers: {
                        'X-Telegram-Init-Data': tg.initData
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('status').innerHTML = `
                        ✅ Добро пожаловать, ${data.first_name}!<br>
                        Ваш ID: ${data.user_id}<br>
                        Токен получен и сохранен
                    `;

                    // Сохраняем токен для будущих запросов
                    localStorage.setItem('access_token', data.access_token);
                } else {
                    document.getElementById('status').innerHTML = `❌ Ошибка: ${data.detail}`;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = `❌ Ошибка сети: ${error.message}`;
            }
        }

        authenticate();
    </script>
</body>
</html>
