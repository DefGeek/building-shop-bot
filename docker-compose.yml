version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stroymarket_db
    restart: always
    environment:
      POSTGRES_USER: stroymarket_user
      POSTGRES_PASSWORD: stroymarket_password
      POSTGRES_DB: stroymarket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stroymarket_user -d stroymarket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stroymarket_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      # ВАЖНО: URL должен указывать на имя сервиса 'db', а не на localhost
      - DATABASE_URL=postgresql+asyncpg://stroymarket_user:stroymarket_password@db:5432/stroymarket_db
    ports:
      - "8000:8000"
    volumes:
      # ВАЖНО: Монтируем только папку backend в /app внутри контейнера
      - ./backend:/app

volumes:
  postgres_data: